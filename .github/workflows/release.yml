name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and build
        run: npm ci && npx webpack

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Sports Live Card ${{ github.ref_name }}"
          generate_release_notes: true
          files: dist/sports-live-card.bundle.js
          body: |
            Install via HACS or add `sports-live-card.bundle.js` as a Lovelace resource.
